controller_manager:
  ros__parameters:
    update_rate: 50
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    base_velocity_controller:
      type: diff_drive_controller/DiffDriveController
    upper_body_controller:
      type: joint_trajectory_controller/JointTrajectoryController

base_velocity_controller:
  ros__parameters:
    # TODO(semubot): Replace placeholders with real wheel joint names and geometry.
    left_wheel_names: [left_wheel_joint]
    right_wheel_names: [right_wheel_joint]

upper_body_controller:
  ros__parameters:
    # TODO(semubot): Update with real arm/head joint list when hardware is finalized.
    joints: [left_arm_joint, right_arm_joint, head_yaw_joint]
